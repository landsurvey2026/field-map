<script>
window.onerror=function(msg,src,line,col,err){
  var el=document.getElementById('jsErr');
  if(el){el.style.display='block';el.textContent='❌ JS오류: '+msg+' (줄'+line+')';}
  return true;
};


window.addEventListener('unhandledrejection',function(e){
  var el=document.getElementById('jsErr');
  if(el){el.style.display='block';el.textContent='❌ Promise오류: '+(e.reason||e);}
});
var db=null,fbState={},PROJ_ID='p6bb59528';
// 담당자 이름 초기값 (localStorage)
var WNAMES_KEY='fm_wnames_'+PROJ_ID;
var workerNames=JSON.parse(localStorage.getItem(WNAMES_KEY)||'{"1":"담당자1","2":"담당자2","3":"담당자3"}');

// 페이지 로드 즉시 Firebase REST API로 이름 불러오기 (SDK 불필요)
(function(){
  var url='https://landsurvey2027-default-rtdb.firebaseio.com/projects/'+PROJ_ID+'/workerNames.json';
  fetch(url).then(function(r){return r.json();}).then(function(raw){
    if(!raw)return;
    var names;
    if(Array.isArray(raw)){
      // Firebase가 숫자키를 배열로 변환한 경우
      names={"1":raw[1]||"담당자1","2":raw[2]||"담당자2","3":raw[3]||"담당자3"};
    }else if(typeof raw==='object'){
      names={"1":raw["1"]||"담당자1","2":raw["2"]||"담당자2","3":raw["3"]||"담당자3"};
    }
    if(names){
      workerNames=names;
      localStorage.setItem(WNAMES_KEY,JSON.stringify(names));
      updateWorkerNames();
    }
  }).catch(function(e){console.log('이름 로딩 실패:',e);});
})();


function fbLoad(){
  // Firebase SDK를 순서대로 로딩
  function loadScript(url,cb){
    var s=document.createElement('script');
    s.src=url;s.async=true;
    s.onload=cb;s.onerror=function(){console.warn('SDK 로드 실패:',url);cb();};
    document.head.appendChild(s);
  }
  loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js',function(){
    loadScript('https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js',function(){
      if(typeof firebase==='undefined'){console.warn('Firebase 없음');return;}
      try{
        if(!firebase.apps.length)firebase.initializeApp({"apiKey": "AIzaSyDCZils_rrPT3A5c163FM4Ij8ZXQBvPuqE", "databaseURL": "https://landsurvey2027-default-rtdb.firebaseio.com", "projectId": "landsurvey2027"});
        db=firebase.database();

        console.log('Firebase 연결됨');
        var _fbDot=document.getElementById('fbDot');
        if(_fbDot){_fbDot.textContent='🟢';_fbDot.title='Firebase 실시간 연결됨';}
        // ★ 라인 상태 실시간 리스너
        db.ref('projects/'+PROJ_ID+'/lineStatus').on('value',function(snap){
          lineStatus=snap.val()||{};
          _lastLineStatus=JSON.stringify(lineStatus);
          drawLines();
          var sm=document.getElementById('statsMod');
          if(sm&&sm.style.display!=='none')showLayerStats();
          console.log('라인상태 실시간 업데이트');
        });
        // ★ 상태 실시간 리스너 (완료/담당자 변경 즉시 반영)
        db.ref('projects/'+PROJ_ID+'/status').on('value',function(snap){
          fbState=snap.val()||{};
          // 삭제된 포인트 처리
          Object.keys(fbState).forEach(function(nm){
            if(fbState[nm]&&fbState[nm].deleted){
              var idx=DALL.findIndex(function(d){return d[0]===nm;});
              if(idx>=0)DALL.splice(idx,1);
            }
            localState[nm]=Object.assign(localState[nm]||{},fbState[nm]);
          });
          drawMarkers();updateStats();buildList(getFltList());
        });
        // DXF 라인 실시간 로딩
        db.ref('projects/'+PROJ_ID+'/dxfLines').once('value',function(snap){
          var raw=snap.val();
          if(!raw)return;
          var data=Array.isArray(raw)?raw:Object.keys(raw).sort(function(a,b){return Number(a)-Number(b);}).map(function(k){return raw[k];});
          DLINES=data.filter(function(d){return d&&d.pts;});
          if(DLINES.length){
            document.getElementById('dxfBtn').style.display='';
            document.getElementById('statsBtn').style.display='';
            if(DALL.length===0){
              var sla=0,sln=0,cnt=0;
              DLINES.forEach(function(l){
                if(l.tp==='text'||l.type==='text')return;
                (l.pts||[]).forEach(function(p){sla+=p[0];sln+=p[1];cnt++;});
              });
              if(cnt>0){Z=15;var c=ll2t(sla/cnt,sln/cnt,Z);CX=c.x;CY=c.y;TC={};document.getElementById('tl').innerHTML='';}
            }
            draw();
          }
        });
        // 담당자명 실시간 감지 (PC에서 바꾸면 즉시 반영)
        db.ref('projects/'+PROJ_ID+'/workerNames').on('value',function(snap){
          var raw=snap.val();
          if(!raw)return;
          var names;
          if(Array.isArray(raw)){
            names={"1":raw[1]||"담당자1","2":raw[2]||"담당자2","3":raw[3]||"담당자3"};
          }else{
            names={"1":raw["1"]||"담당자1","2":raw["2"]||"담당자2","3":raw["3"]||"담당자3"};
          }
          workerNames=names;
          localStorage.setItem(WNAMES_KEY,JSON.stringify(names));
          updateWorkerNames();
          buildList(getFltList());
        });
      }catch(e){console.warn('Firebase 오류:',e);}
    });
  });
}
</script>

// 하버사인 공식으로 두 점 거리(m)
function haversine(la1,ln1,la2,ln2){
  var R=6371000,dLa=(la2-la1)*Math.PI/180,dLn=(ln2-ln1)*Math.PI/180;
  var a=Math.sin(dLa/2)*Math.sin(dLa/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLn/2)*Math.sin(dLn/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
// 라인 전체 연장
function lineLength(pts){
  var total=0;
  for(var i=0;i<pts.length-1;i++) total+=haversine(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1]);
  return total;
}

// 점-선분 거리
function distToSeg(px,py,ax,ay,bx,by){
  var dx=bx-ax,dy=by-ay,t=((px-ax)*dx+(py-ay)*dy)/(dx*dx+dy*dy||1);
  t=Math.max(0,Math.min(1,t));
  return Math.hypot(px-(ax+t*dx),py-(ay+t*dy));
}

// 클릭 위치에서 가장 가까운 라인 찾기
function findNearestLine(sx,sy){
  if(!DLINES||!DLINES.length||!showLines)return null;
  var bestIdx=-1,bestDist=30; // 30px 이내
  for(var li=0;li<DLINES.length;li++){
    var item=DLINES[li];
    var tp=item.tp||item.type||'line';
    if(!isLayerVisible(item.layer))return; // 숨긴 레이어 건너뜀
    if(tp==='text')continue;
    var pts=item.pts;
    if(!pts||pts.length<2)continue;
    for(var i=0;i<pts.length-1;i++){
      var t1=ll2t(pts[i][0],pts[i][1],Z);
      var t2=ll2t(pts[i+1][0],pts[i+1][1],Z);
      var ax=(t1.x-CX)*256+W/2,ay=(t1.y-CY)*256+H/2;
      var bx=(t2.x-CX)*256+W/2,by=(t2.y-CY)*256+H/2;
      var d=distToSeg(sx,sy,ax,ay,bx,by);
      if(d<bestDist){bestDist=d;bestIdx=li;}
    }
  }
  return bestIdx>=0?{idx:bestIdx,item:DLINES[bestIdx]}:null;

function _nominatimAddr(la,ln,elId){
  fetch('https://nominatim.openstreetmap.org/reverse?lat='+la+'&lon='+ln+'&format=jsonv2&accept-language=ko&addressdetails=1&zoom=18')
  .then(function(r){return r.json();})
  .then(function(d){
    var el=document.getElementById(elId);
    if(!el||el.textContent.indexOf('조회 중')<0)return;
    var addr='주소를 찾을 수 없어요';
    if(d&&d.address){
      var a=d.address,p=[];
      if(a.state)p.push(a.state);
      if(a.city||a.county||a.town||a.village)p.push(a.city||a.county||a.town||a.village);
      if(a.suburb||a.quarter||a.neighbourhood)p.push(a.suburb||a.quarter||a.neighbourhood);
      if(a.road)p.push(a.road);
      if(a.house_number)p.push(a.house_number+'번');
      if(p.length>0)addr=p.join(' ');
    }
    el.textContent=addr;
  }).catch(function(){
    var el=document.getElementById(elId);
    if(el&&el.textContent.indexOf('조회 중')>=0)el.textContent='주소 조회 실패';
  });
}

// DXF 라인 그리기
function drawLines(){
  var cv=document.getElementById('lineCanvas');
  if(!cv)return;
  cv.width=W;cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.clearRect(0,0,W,H);
  if(!showLines||!DLINES||!DLINES.length)return;
  DLINES.forEach(function(item){
    var idx3=DLINES.indexOf(item);
    var isDone3=lineDone(idx3);
    // CAD 색상 우선 (DXF 업로드 시 추출), 없으면 파란색
    var baseColor=item.color||'#3b82f6';
    var color=isDone3?'#2dc653':baseColor;
    if(item.tp==='text'||item.type==='text'){
      // 텍스트 표시
      if(!item.pts||!item.pts[0])return;
      var t=ll2t(item.pts[0][0],item.pts[0][1],Z);
      var sx=(t.x-CX)*256+W/2,sy=(t.y-CY)*256+H/2;
      if(sx<-200||sx>W+200||sy<-200||sy>H+200)return;
      var fontSize=Math.max(10,Math.min(18,Z-4));
      ctx.font='bold '+fontSize+'px Arial';
      ctx.fillStyle=color;
      ctx.globalAlpha=0.9;
      ctx.strokeStyle='rgba(255,255,255,0.8)';
      ctx.lineWidth=3;
      ctx.strokeText(item.text||'',sx,sy);
      ctx.fillText(item.text||'',sx,sy);
    } else {
      // 라인 표시
      var pts=item.pts;
      if(!pts||pts.length<2)return;
      var li2=DLINES.indexOf(item);
      var done2=lineDone(li2);
      ctx.beginPath();
      ctx.strokeStyle=done2?'#2dc653':color;
      ctx.lineWidth=(done2?2:1)*(Z>=16?2.5:Z>=14?2:1.5);
      ctx.globalAlpha=0.9;
      var first=true;
      pts.forEach(function(pt){
        var t=ll2t(pt[0],pt[1],Z);
        var sx=(t.x-CX)*256+W/2,sy=(t.y-CY)*256+H/2;
        if(first){ctx.moveTo(sx,sy);first=false;}
        else ctx.lineTo(sx,sy);
      });
      ctx.stroke();
      // 선택된 라인 강조 (인덱스로 비교)
      if(selLine>=0&&DLINES[selLine]===item){
        ctx.strokeStyle='#FFD700';
        ctx.lineWidth=(Z>=16?4:3);
        ctx.globalAlpha=0.95;
        ctx.beginPath();
        var first2=true;
        pts.forEach(function(pt){
          var t=ll2t(pt[0],pt[1],Z);
          var sx=(t.x-CX)*256+W/2,sy=(t.y-CY)*256+H/2;
          if(first2){ctx.moveTo(sx,sy);first2=false;}
          else ctx.lineTo(sx,sy);
        });
        ctx.stroke();
      }
    }
  });
  ctx.globalAlpha=1.0;
}

// 레이어별 통계 계산
function calcLayerStats(layerName){
  var lines=DLINES.filter(function(item){
    var tp=item.tp||item.type||'line';
    if(tp==='text')return false;
    if(layerName==='ALL' && (hiddenLayers[item.layer]||hiddenFromStats[item.layer]))return false; // 지도/통계 숨김 레이어 제외
    if(layerName!=='ALL' && item.layer!==layerName)return false;
    return true;
  });
  var total=0,done=0,doneLen=0;
  lines.forEach(function(item){
    var realIdx=DLINES.indexOf(item);
    var len=lineLength(item.pts||[]);
    total+=len;
    if(lineDone(realIdx)){done++;doneLen+=len;}
  });
  return{count:lines.length,total:total,done:done,doneLen:doneLen,
         pct:total>0?Math.round(doneLen/total*100):0};
}

// 포인트 통계 (DXF 없는 사업용)
function calcPointStats(){
  var total=DALL.length,done=0;
  DALL.forEach(function(d){if(isDone(d[0]))done++;});
  return{total:total,done:done,pct:total>0?Math.round(done/total*100):0};
}

function deleteLine(idx){
  if(idx<0||idx>=DLINES.length)return;
  if(!confirm('라인 '+(idx+1)+'번을 삭제할까요?'))return;
  var FB='https://landsurvey2027-default-rtdb.firebaseio.com/projects/'+PROJ_ID;
  // Firebase에서 라인 배열 가져오기
  fetch(FB+'/dxfLines.json',{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(raw){
      var lines=Array.isArray(raw)?raw:Object.keys(raw).sort(function(a,b){return Number(a)-Number(b);}).map(function(k){return raw[k];});
      lines.splice(idx,1); // 해당 인덱스 제거
      // 라인 상태도 재정렬
      return fetch(FB+'/lineStatus.json',{cache:'no-store'})
        .then(function(r){return r.json();})
        .then(function(st){
          var newSt={};
          Object.keys(st||{}).forEach(function(k){
            var n=parseInt(k.replace('line_',''));
            if(n<idx) newSt[k]=(st)[k];
            else if(n>idx) newSt['line_'+(n-1)]=(st)[k];
          });
          return Promise.all([
            fetch(FB+'/dxfLines.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(lines)}),
            fetch(FB+'/lineStatus.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(newSt)})
          ]);
        });
    })
    .then(function(){
      // 로컬 업데이트
      DLINES.splice(idx,1);
      selLine=-1;selLineData=null;
      document.getElementById('linePop').style.display='none';
      draw();
      alert('라인이 삭제됐어요.\n관리자 프로그램에서 🚀 지도 배포를 해주세요.');
    })
    .catch(function(e){alert('삭제 실패: '+e);});
}

function flyToLineIdx(idx, keepStats){
  if(idx<0||idx>=DLINES.length)return;
  // 텍스트는 건너뜀 - 다음 라인으로
  while(idx<DLINES.length&&(DLINES[idx].tp||DLINES[idx].type||'line')==='text')idx++;
  if(idx>=DLINES.length)return;
  var item=DLINES[idx];
  var pts=item.pts||[];
  if(!pts.length)return;
  var sla=0,sln=0;
  pts.forEach(function(p){sla+=p[0];sln+=p[1];});
  var nz=Math.min(18,Z+3),f=Math.pow(2,nz-Z);
  CX*=f;CY*=f;Z=nz;TC={};document.getElementById('tl').innerHTML='';
  var c=ll2t(sla/pts.length,sln/pts.length,Z);CX=c.x;CY=c.y;
  selLine=idx;selLineData=item;
  draw();
  savePos(); // 이동 후 위치 저장
  if(!keepStats)document.getElementById('statsMod').style.display='none';
}

var _gpsOn=false, _gpsWatchId=null, _gpsLa=null, _gpsLn=null, _gpsAcc=null;

function toggleGPS(){
  if(_gpsOn){
    // GPS 끄기
    if(_gpsWatchId!=null){navigator.geolocation.clearWatch(_gpsWatchId);_gpsWatchId=null;}
    _gpsOn=false; _gpsLa=null; _gpsLn=null;
    document.getElementById('gpsBtn').style.background='#fff';
    document.getElementById('gpsBtn').style.boxShadow='0 2px 8px rgba(0,0,0,.2)';
    draw();
    return;
  }
  if(!navigator.geolocation){
    alert('이 브라우저는 GPS를 지원하지 않아요.');return;
  }
  document.getElementById('gpsBtn').style.background='#e8f4ff';
  document.getElementById('gpsBtn').textContent='⌛';
  var _gpsBest=null; // 가장 정확한 위치 저장
  // watchPosition으로 바로 시작 - 정확도 개선될 때마다 업데이트
  _gpsWatchId=navigator.geolocation.watchPosition(function(pos){
    var acc=pos.coords.accuracy;
    // 이전보다 정확하거나 첫 수신
    if(!_gpsOn||!_gpsBest||acc<_gpsBest){
      _gpsBest=acc;
      _gpsLa=pos.coords.latitude;
      _gpsLn=pos.coords.longitude;
      _gpsAcc=acc;
      if(!_gpsOn){
        // 첫 위치 수신 시 지도 이동
        _gpsOn=true;
        var nz=Math.max(Z,16);
        var f=Math.pow(2,nz-Z); CX*=f; CY*=f; Z=nz;
        var c=ll2t(_gpsLa,_gpsLn,Z); CX=c.x; CY=c.y;
        TC={}; document.getElementById('tl').innerHTML='';
      }
      // 정확도 표시
      var accTxt=acc<20?'📍':acc<50?'🔵':acc<100?'🟡':'🔴';
      document.getElementById('gpsBtn').textContent=accTxt;
      document.getElementById('gpsBtn').style.background='#dbeafe';
      document.getElementById('gpsBtn').style.boxShadow='0 0 0 2px #3b82f6';
      document.getElementById('gpsBtn').title='현재위치 (정확도: '+Math.round(acc)+'m)';
      draw();
    }
  },function(err){
    document.getElementById('gpsBtn').textContent='📍';
    document.getElementById('gpsBtn').style.background='#fff';
    document.getElementById('gpsBtn').style.boxShadow='0 2px 8px rgba(0,0,0,.2)';
    if(!_gpsOn){
      var msg={1:'위치 권한을 허용해주세요.',2:'위치를 가져올 수 없어요.',3:'시간이 초과됐어요.'};
      alert('GPS 오류: '+(msg[err.code]||err.message));
    }
  },{enableHighAccuracy:true,maximumAge:0,timeout:20000});
}

function drawGPS(ctx){
  if(!_gpsOn||_gpsLa==null)return;
  var c=ll2t(_gpsLa,_gpsLn,Z);
  var sx=(c.x-CX)*256+W/2, sy=(c.y-CY)*256+H/2;
  // 정확도 원 (최대 60px로 제한)
  if(_gpsAcc){
    var mpp=156543.03*Math.cos(_gpsLa*Math.PI/180)/Math.pow(2,Z);
    var r=Math.min(_gpsAcc/mpp, 60);
    if(r>16){
      ctx.beginPath(); ctx.arc(sx,sy,r,0,Math.PI*2);
      ctx.fillStyle='rgba(59,130,246,0.10)';ctx.fill();
      ctx.strokeStyle='rgba(59,130,246,0.30)';ctx.lineWidth=1;ctx.stroke();
    }
  }
  // 외곽 흰 원
  ctx.beginPath();ctx.arc(sx,sy,14,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.shadowColor='rgba(0,0,0,.3)';ctx.shadowBlur=6;ctx.fill();
  ctx.shadowBlur=0;
  // 파란 내부 원
  ctx.beginPath();ctx.arc(sx,sy,9,0,Math.PI*2);
  ctx.fillStyle='#3b82f6';ctx.fill();
  // 중앙 흰 점
  ctx.beginPath();ctx.arc(sx,sy,3,0,Math.PI*2);
  ctx.fillStyle='#fff';ctx.fill();
}

// 좌표변환
function ll2t(la,ln,z){var n=Math.pow(2,z);return{x:(ln+180)/360*n,y:(1-Math.log(Math.tan(la*R)+1/Math.cos(la*R))/Math.PI)/2*n};}
function t2ll(tx,ty,z){var n=Math.pow(2,z),ln=tx/n*360-180;return{la:Math.atan(Math.sinh(Math.PI*(1-2*ty/n)))/R,ln:ln};}

function s2t(sx,sy){return{x:sx/256+CX-W/512,y:sy/256+CY-H/512};}

function drawTiles(){
  var td=document.getElementById('tl'),n=Math.pow(2,Z);
  var x0=Math.floor(CX-W/512)-1,y0=Math.floor(CY-H/512)-1,x1=Math.ceil(CX+W/512)+1,y1=Math.ceil(CY+H/512)+1;
  td.querySelectorAll('.tile').forEach(function(t){
    if(+t.dataset.z!==Z){t.style.display='none';return;}
    t.style.display='block';var p=p2s(+t.dataset.x,+t.dataset.y);t.style.left=p.x+'px';t.style.top=p.y+'px';
  });
  for(var tx=x0;tx<=x1;tx++){for(var ty=y0;ty<=y1;ty++){
    if(ty<0||ty>=n)continue;

    if(TC[k])continue;TC[k]=1;
    var img=new Image();img.className='tile';img.dataset.x=tx;img.dataset.y=ty;img.dataset.z=Z;img.dataset.ntx=ntx;img.dataset.ty2=ty;img.dataset.tz=Z;
    img.onerror=function(){if(this.dataset.tried)return;this.dataset.tried=1;this.src='https://a.tile.openstreetmap.org/'+this.dataset.tz+'/'+this.dataset.ntx+'/'+this.dataset.ty2+'.png';};
    img.src=getTileUrl(tx,ty,Z,ntx);

    td.appendChild(img);

// 클러스터
function cluster(pts){
  var cell=44,g={};
  pts.forEach(function(d){
    var t=ll2t(d[1],d[2],Z),x=(t.x-CX)*256+W/2,y=(t.y-CY)*256+H/2;
    if(x<-80||x>W+80||y<-80||y>H+80)return;
    if(selMode){g[d[0]]={p:[d],la:d[1],ln:d[2],x:x,y:y};return;}
    var k=Math.floor(x/cell)+','+Math.floor(y/cell);
    if(!g[k])g[k]={p:[],la:0,ln:0,x:0,y:0};
    g[k].p.push(d);g[k].la+=d[1];g[k].ln+=d[2];g[k].x+=x;g[k].y+=y;
  });
  return Object.keys(g).map(function(k){var c=g[k],n=c.p.length;return{pts:c.p,la:n>1?c.la/n:c.la,ln:n>1?c.ln/n:c.ln,x:n>1?c.x/n:c.x,y:n>1?c.y/n:c.y};});
}

// 박스 선택 (PC)
var boxStart=null,boxEnd=null;
function updateBoxRect(){
  if(!boxStart||!boxEnd)return;
  var x1=Math.min(boxStart.x,boxEnd.x),y1=Math.min(boxStart.y,boxEnd.y);
  var x2=Math.max(boxStart.x,boxEnd.x),y2=Math.max(boxStart.y,boxEnd.y);
  var r=document.getElementById('boxRect');
  r.style.cssText='display:block;left:'+x1+'px;top:'+y1+'px;width:'+(x2-x1)+'px;height:'+(y2-y1)+'px';
}
function finishBox(){
  if(!boxStart||!boxEnd){boxStart=null;return;}
  var x1=Math.min(boxStart.x,boxEnd.x),y1=Math.min(boxStart.y,boxEnd.y);
  var x2=Math.max(boxStart.x,boxEnd.x),y2=Math.max(boxStart.y,boxEnd.y);
  document.getElementById('boxRect').style.display='none';
  if(x2-x1<5&&y2-y1<5){boxStart=null;return;}
  // 박스 → 위경도 변환
  var tl1=s2t(x1,y1),tl2=s2t(x2,y2);
  var ll1=t2ll(tl1.x,tl1.y,Z),ll2=t2ll(tl2.x,tl2.y,Z);
  var mla=Math.min(ll1.la,ll2.la),xla=Math.max(ll1.la,ll2.la);
  var mln=Math.min(ll1.ln,ll2.ln),xln=Math.max(ll1.ln,ll2.ln);
  selSet=new Set();
  DALL.forEach(function(d){if(d[1]>=mla&&d[1]<=xla&&d[2]>=mln&&d[2]<=xln)selSet.add(d[0]);});
  boxStart=null;
  updateSelPanel();drawMarkers();
}

// 라쏘 선택 (모바일)
function drawLasso(){
  lassoCtx.clearRect(0,0,W,H);
  if(lassoPath.length<2)return;
  lassoCtx.beginPath();
  lassoCtx.moveTo(lassoPath[0].x,lassoPath[0].y);
  for(var i=1;i<lassoPath.length;i++)lassoCtx.lineTo(lassoPath[i].x,lassoPath[i].y);
  lassoCtx.closePath();
  lassoCtx.fillStyle='rgba(168,85,247,.12)';lassoCtx.fill();
  lassoCtx.strokeStyle='#a855f7';lassoCtx.lineWidth=2;lassoCtx.setLineDash([6,3]);lassoCtx.stroke();
}
function pointInPoly(px,py,poly){
  var inside=false;
  for(var i=0,j=poly.length-1;i<poly.length;j=i++){
    var xi=poly[i].x,yi=poly[i].y,xj=poly[j].x,yj=poly[j].y;
    if(((yi>py)!==(yj>py))&&(px<(xj-xi)*(py-yi)/(yj-yi)+xi))inside=!inside;
  }return inside;
}
function finishLasso(){
  if(lassoPath.length<3){lassoPath=[];lassoCtx.clearRect(0,0,W,H);return;}
  selSet=new Set();
  DALL.forEach(function(d){
    var t=ll2t(d[1],d[2],Z),px=(t.x-CX)*256+W/2,py=(t.y-CY)*256+H/2;
    if(pointInPoly(px,py,lassoPath))selSet.add(d[0]);
  });
  lassoPath=[];lassoCtx.clearRect(0,0,W,H);
  updateSelPanel();drawMarkers();
}

function getAddr(la,ln,cb){

    .then(function(r){return r.json();}).then(function(d){
      var addr='주소 없음';
      if(d&&d.address){var a=d.address,p=[];
        if(a.province||a.state)p.push(a.province||a.state);

        if(a.suburb||a.quarter||a.neighbourhood||a.village)p.push(a.suburb||a.quarter||a.neighbourhood||a.village);
        if(a.road)p.push(a.road);if(a.house_number)p.push(a.house_number);
        addr=p.length?p.join(' '):(d.display_name||'주소 없음');}

var lastPollData = '';
function pollStatus(){
  var FB='https://landsurvey2027-default-rtdb.firebaseio.com/projects/'+PROJ_ID;
  // ── 포인트 상태 ──
  fetch(FB+'/status.json',{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d||typeof d!=='object')return;
      var s=JSON.stringify(d);
      if(s===lastPollData)return; // 변경 없으면 무시
      lastPollData=s;
      fbState=d;
      Object.keys(d).forEach(function(nm){
        if(d[nm]&&typeof d[nm]==='object')
          localState[nm]=Object.assign(localState[nm]||{},d[nm]);
      });
      drawMarkers();updateStats();buildList(getFltList());
    }).catch(function(e){console.log('[포인트폴링오류]',e);});
  // ── 라인 상태 ──
  fetch(FB+'/lineStatus.json',{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d||typeof d!=='object')return;
      var s=JSON.stringify(d);
      if(s===_lastLineStatus)return;
      _lastLineStatus=s;
      lineStatus=d;
      drawLines();
      var sm=document.getElementById('statsMod');
      if(sm&&sm.style.display!=='none')showLayerStats();
    }).catch(function(e){console.log('[라인폴링오류]',e);});
}
setInterval(pollStatus,2000);
// 첫 로딩 즉시 1회 실행
setTimeout(pollStatus,500);

// 라인 완료 상태 즉시 로딩
fetch('https://landsurvey2027-default-rtdb.firebaseio.com/projects/'+PROJ_ID+'/lineStatus.json',{cache:'no-store'})
  .then(function(r){return r.json();})
  .then(function(d){
    if(d&&typeof d==='object'){
      lineStatus=d;
      _lastLineStatus=JSON.stringify(d);
      drawLines();
    }
  }).catch(function(){});

// Firebase에서 DXF 라인 로딩
fetch('https://landsurvey2027-default-rtdb.firebaseio.com/projects/'+PROJ_ID+'/dxfLines.json',{cache:'no-store'})
  .then(function(r){return r.json();})
  .then(function(raw){
    if(!raw)return;
    // Firebase가 배열을 객체로 변환할 수 있음 {"0":{...},"1":{...}}
    var data;
    if(Array.isArray(raw)){
      data=raw;
    } else if(typeof raw==='object'){
      data=Object.keys(raw).sort(function(a,b){return Number(a)-Number(b);}).map(function(k){return raw[k];});
    }
    if(!data||!data.length)return;
    DLINES=data.filter(function(d){return d&&d.pts;});
    if(!DLINES.length)return;
    document.getElementById('dxfBtn').style.display='';
    document.getElementById('statsBtn').style.display='';
    // DALL 없으면 DXF 중심으로 이동
    if(DALL.length===0){
      var sla=0,sln=0,cnt=0;
      DLINES.forEach(function(l){
        if(l.tp==='text'||l.type==='text')return;
        (l.pts||[]).forEach(function(p){sla+=p[0];sln+=p[1];cnt++;});
      });
      if(cnt>0){
        Z=15;
        var c=ll2t(sla/cnt,sln/cnt,Z);
        CX=c.x;CY=c.y;
        TC={};
        document.getElementById('tl').innerHTML='';
      }
    }
    draw();
    if(_posFirstLoad){
      // 첫 방문: 첫 번째 라인으로 자동 이동 (최대 줌)
      setTimeout(function(){flyToLineIdx(0, false);}, 300);
    }
    console.log('DXF 로딩 완료:',DLINES.length,'개');
  }).catch(function(e){console.log('DXF 로딩 오류:',e);});
</script>
