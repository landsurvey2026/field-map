<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>현장관리시스템</title>

<!-- Leaflet -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<!-- ExcelJS (엑셀 읽기) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
:root{
  --navy:#0c1e4a; --navy2:#0f2952; --sky:#38bdf8; --sky-d:#0ea5e9;
  --ink:#1e293b; --mut:#64748b; --line:#e2e8f0; --bg:#f1f5f9;
  --ok:#16a34a; --warn:#f59e0b; --bad:#dc2626;
  --w1:#3b82f6; --w2:#f97316; --w3:#a855f7;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Pretendard',-apple-system,'Malgun Gothic',sans-serif;background:var(--bg);color:var(--ink)}
#app{position:fixed;inset:0;display:flex;flex-direction:column}

/* ── 상단 바 ── */
#topbar{height:54px;background:var(--navy);display:flex;align-items:center;
  padding:0 12px;gap:10px;color:#fff;z-index:1000;box-shadow:0 2px 8px rgba(0,0,0,.15)}
#topbar .logo{font-size:18px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:7px}
#topbar .logo .dot{width:9px;height:9px;border-radius:50%;background:var(--sky)}
#projName{font-size:13px;color:var(--sky);font-weight:600;margin-left:4px;
  max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#topbar .spacer{flex:1}
.tbtn{background:rgba(255,255,255,.1);border:none;color:#fff;border-radius:8px;
  padding:7px 12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px}
.tbtn:hover{background:rgba(255,255,255,.18)}
.tbtn.admin{background:var(--sky);color:var(--navy)}

/* ── 지도 ── */
#map{flex:1;width:100%;background:#aadaff;z-index:1}

/* ── 통계 칩 ── */
#statChips{position:absolute;top:62px;left:10px;z-index:500;display:flex;gap:6px;flex-wrap:wrap;max-width:calc(100% - 80px)}
.chip{background:#fff;border-radius:20px;padding:5px 11px;font-size:12px;font-weight:700;
  box-shadow:0 2px 8px rgba(0,0,0,.12);display:flex;align-items:center;gap:5px}
.chip .cdot{width:8px;height:8px;border-radius:50%}

/* ── 우측 도구 ── */
#tools{position:absolute;top:62px;right:10px;z-index:500;display:flex;flex-direction:column;gap:6px}
.tool{width:42px;height:42px;background:#fff;border:none;border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.15);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;color:var(--ink)}
.tool:active{transform:scale(.95)}
.tool.on{background:var(--sky);color:#fff}

/* ── 범례 ── */
#legend{position:absolute;bottom:14px;left:10px;z-index:500;background:rgba(15,30,60,.92);
  color:#fff;border-radius:12px;padding:10px 12px;font-size:12px;backdrop-filter:blur(4px)}
#legend .lrow{display:flex;align-items:center;gap:7px;margin:3px 0}
#legend .lc{width:11px;height:11px;border-radius:50%}

/* ── 크레딧 ── */
#credit{position:absolute;bottom:14px;right:10px;z-index:500;
  background:rgba(15,30,60,.7);color:#94a3b8;font-size:10px;
  padding:4px 9px;border-radius:6px;font-style:italic}

/* ── 하단 시트(목록) ── */
#sheet{position:absolute;left:0;right:0;bottom:0;z-index:800;background:#fff;
  border-radius:18px 18px 0 0;box-shadow:0 -4px 24px rgba(0,0,0,.18);
  transform:translateY(calc(100% - 44px));transition:transform .3s;max-height:70vh;display:flex;flex-direction:column}
#sheet.open{transform:translateY(0)}
#sheetHandle{height:44px;display:flex;align-items:center;justify-content:center;
  gap:8px;cursor:pointer;font-weight:700;color:var(--navy);font-size:14px;border-bottom:1px solid var(--line)}
#sheetHandle .grab{width:36px;height:4px;background:var(--line);border-radius:2px;position:absolute;top:7px;left:50%;transform:translateX(-50%)}
#sheetBody{overflow-y:auto;padding:8px 0}
.litem{padding:11px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;gap:10px;cursor:pointer}
.litem:active{background:#f8fafc}
.litem .ltag{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.litem .lname{font-weight:600;font-size:14px}
.litem .lsub{font-size:11px;color:var(--mut);margin-top:1px}
.litem .lstat{margin-left:auto;font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700}

/* ── 오버레이/모달 공통 ── */
.ovl{position:fixed;inset:0;z-index:2000;background:rgba(15,23,42,.5);
  display:none;align-items:center;justify-content:center;padding:20px}
.ovl.show{display:flex}
.modal{background:#fff;border-radius:16px;max-width:480px;width:100%;
  max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal .mhead{padding:18px 20px;border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between}
.modal .mhead h3{font-size:17px;font-weight:800;color:var(--navy)}
.modal .mclose{border:none;background:none;font-size:24px;color:var(--mut);cursor:pointer}
.modal .mbody{padding:20px}

/* ── 관리자 게이트(PIN) ── */
#gate{position:fixed;inset:0;z-index:3000;background:var(--navy);
  display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:20px}
#gate.show{display:flex}
#gate .glogo{font-size:24px;font-weight:800;margin-bottom:6px}
#gate .gsub{font-size:13px;color:var(--sky);margin-bottom:30px}
#gatePin{font-size:28px;letter-spacing:12px;text-align:center;width:200px;
  background:transparent;border:none;border-bottom:2px solid var(--sky);color:#fff;padding:10px 0;outline:none}
#gatePin::placeholder{letter-spacing:8px;font-size:18px;color:#475569}
#gateErr{color:#fca5a5;font-size:13px;margin-top:12px;height:18px}
.gbtn{margin-top:24px;background:var(--sky);color:var(--navy);border:none;
  border-radius:10px;padding:12px 40px;font-size:15px;font-weight:700;cursor:pointer}

/* ── 폼 요소 ── */
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--mut);margin-bottom:5px}
.field input,.field select{width:100%;padding:10px 12px;border:1px solid var(--line);
  border-radius:8px;font-size:14px;outline:none}
.field input:focus,.field select:focus{border-color:var(--sky)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:11px 18px;border:none;border-radius:9px;font-size:14px;font-weight:700;cursor:pointer}
.btn-pri{background:var(--sky);color:#fff}
.btn-pri:hover{background:var(--sky-d)}
.btn-sec{background:var(--bg);color:var(--ink)}
.btn-full{width:100%}
.btn-row{display:flex;gap:8px;margin-top:8px}

/* ── 관리자 패널 ── */
.adm-sec{margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--line)}
.adm-sec:last-child{border-bottom:none}
.adm-sec h4{font-size:14px;font-weight:800;color:var(--navy);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.adm-log{font-size:12px;color:var(--mut);margin-top:8px;min-height:16px}
.file-drop{border:2px dashed var(--line);border-radius:10px;padding:18px;text-align:center;
  color:var(--mut);font-size:13px;cursor:pointer;transition:.2s}
.file-drop:hover{border-color:var(--sky);color:var(--sky)}

/* ── 토스트 ── */
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);
  z-index:4000;background:var(--navy);color:#fff;padding:11px 20px;border-radius:24px;
  font-size:13px;font-weight:600;opacity:0;transition:.3s;pointer-events:none;box-shadow:0 6px 20px rgba(0,0,0,.25)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── 스플래시 ── */
#splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#0c1e4a,#0a3060);
  display:flex;align-items:center;justify-content:center;
  animation:splashHide .5s ease 2s forwards}
@keyframes splashHide{99%{opacity:0;visibility:visible}100%{opacity:0;visibility:hidden;pointer-events:none}}
#splash .scard{text-align:center;color:#fff}
#splash .stitle{font-size:30px;font-weight:900}
#splash .stitle .b{color:var(--sky)}
#splash .sline{width:120px;height:2px;background:var(--sky);margin:14px auto}
#splash .ssub{font-size:12px;color:#7dd3fc;font-style:italic}
#splash .sbar{width:200px;height:4px;background:rgba(56,189,248,.2);border-radius:2px;overflow:hidden;margin:18px auto 0}
#splash .sbar i{display:block;height:100%;background:var(--sky);width:0;animation:sbar 2s linear forwards}
@keyframes sbar{to{width:100%}}

/* Leaflet 라벨 */
.line-label{background:transparent;border:none;box-shadow:none;
  color:var(--w1);font-weight:800;font-size:12px;text-shadow:0 0 3px #fff,0 0 3px #fff}
.pt-label{background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:5px;
  padding:1px 5px;font-size:11px;font-weight:800;color:#0c1e4a;
  box-shadow:0 1px 4px rgba(0,0,0,.2);white-space:nowrap}
.pt-label.hl{font-size:22px !important;padding:4px 10px;border:2px solid #38bdf8;
  background:#fff;color:#0ea5e9;z-index:9999 !important;box-shadow:0 0 0 4px rgba(56,189,248,.3),0 4px 12px rgba(0,0,0,.3)}
.pt-label::before{display:none}

@media(min-width:768px){
  #sheet{max-width:420px;left:auto;right:14px;bottom:14px;border-radius:16px;
    transform:translateY(calc(100% - 44px))}
  #sheet.open{transform:translateY(0)}
}
</style>
</head>
<body>

<!-- 스플래시 -->
<div id="splash">
  <div class="scard">
    <div class="stitle">현장관리<span class="b">시스템</span></div>
    <div class="sline"></div>
    <div class="ssub">Dev. Seo Young Min</div>
    <div class="sbar"><i></i></div>
  </div>
</div>

<div id="app">
  <!-- 상단 -->
  <div id="topbar">
    <div class="logo"><span class="dot"></span>현장관리<span id="projName"></span></div>
    <div class="spacer"></div>
    <button class="tbtn" id="dashBtn">📊 현황표</button>
    <button class="tbtn" id="perfBtn">🏆 실적</button>
    <button class="tbtn" id="searchBtn">🔍</button>
    <button class="tbtn admin" id="adminBtn">⚙</button>
  </div>

  <!-- 지도 -->
  <div id="map"></div>

  <!-- 통계 칩 -->
  <div id="statChips"></div>

  <!-- 우측 도구 -->
  <div id="tools">
    <button class="tool" id="boxSelBtn" title="범위 선택">▣</button>
    <button class="tool" id="layerBtn" title="지도 전환">🗺️</button>
    <button class="tool" id="gpsBtn" title="내 위치">📍</button>
    <button class="tool" id="fitBtn" title="전체 보기">⬜</button>
  </div>

  <!-- 범례 -->
  <div id="legend">
    <div class="lrow"><span class="lc" style="background:#dc2626"></span>미할당</div>
    <div class="lrow"><span class="lc" style="background:var(--w1)"></span>담당자1</div>
    <div class="lrow"><span class="lc" style="background:var(--w2)"></span>담당자2</div>
    <div class="lrow"><span class="lc" style="background:var(--w3)"></span>담당자3</div>
    <div class="lrow"><span class="lc" style="background:#16a34a"></span>완료</div>
  </div>

  <div id="credit">Dev. Seo Young Min</div>

  <!-- 범위선택 안내/패널 -->
  <div id="boxHint" style="display:none;position:absolute;top:62px;left:50%;transform:translateX(-50%);
    z-index:600;background:#0c1e4a;color:#fff;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:600;
    box-shadow:0 4px 16px rgba(0,0,0,.3)">드래그하여 영역을 선택하세요</div>

  <!-- 선택된 포인트 일괄배정 패널 -->
  <div id="selPanel" style="display:none;position:absolute;bottom:60px;left:50%;transform:translateX(-50%);
    z-index:700;background:#fff;border-radius:14px;padding:14px 16px;box-shadow:0 6px 28px rgba(0,0,0,.25);
    min-width:280px">
    <div style="font-size:14px;font-weight:800;color:#0c1e4a;margin-bottom:10px">
      <span id="selCount">0</span>개 선택됨 - 담당자 일괄 배정</div>
    <div id="selWorkerBtns" style="display:flex;gap:6px;margin-bottom:8px"></div>
    <div style="display:flex;gap:6px">
      <button id="selCancel" class="btn btn-sec" style="flex:1">완료취소</button>
      <button id="selClose" class="btn btn-sec" style="flex:1">닫기</button>
    </div>
  </div>


</div>

<!-- 검색 모달 -->
<div class="ovl" id="searchOvl">
  <div class="modal">
    <div class="mhead"><h3>검색</h3><button class="mclose" data-close>×</button></div>
    <div class="mbody">
      <div class="field"><input id="searchInput" placeholder="포인트명, 레이어, 주소 검색..."></div>
      <div id="searchList"></div>
    </div>
  </div>
</div>

<!-- 현황표 모달 -->
<div class="ovl" id="dashOvl">
  <div class="modal" style="max-width:440px">
    <div class="mhead"><h3>📊 작업 현황표</h3><button class="mclose" data-close>×</button></div>
    <div class="mbody" id="dashBody"></div>
  </div>
</div>

<!-- 실적 모달 -->
<div class="ovl" id="perfOvl">
  <div class="modal" style="max-width:440px">
    <div class="mhead"><h3>🏆 담당자 실적</h3><button class="mclose" data-close>×</button></div>
    <div class="mbody" id="perfBody"></div>
  </div>
</div>

<!-- 관리자 게이트 -->
<div id="gate">
  <div class="glogo">🔒 관리자 인증</div>
  <div class="gsub">현장관리시스템</div>
  <input id="gatePin" type="password" inputmode="numeric" maxlength="6" placeholder="PIN">
  <div id="gateErr"></div>
  <button class="gbtn" id="gateGo">확인</button>
</div>

<!-- 관리자 패널 -->
<div class="ovl" id="adminOvl">
  <div class="modal">
    <div class="mhead"><h3>⚙ 관리자</h3><button class="mclose" data-close>×</button></div>
    <div class="mbody">

      <div class="adm-sec">
        <h4>📋 사업 선택</h4>
        <div class="field">
          <select id="admProjSel"></select>
        </div>
        <div class="btn-row">
          <button class="btn btn-sec" id="admNewProj">+ 새 사업</button>
          <button class="btn btn-sec" id="admDelProj">사업 삭제</button>
        </div>
      </div>

      <div class="adm-sec">
        <h4>📐 DXF 업로드 (라인)</h4>
        <div class="file-drop" id="dxfDrop">DXF 파일을 선택하거나 끌어다 놓으세요</div>
        <input type="file" id="dxfFile" accept=".dxf" hidden>
        <div class="btn-row">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--mut)">
            <input type="checkbox" id="dxfAppend"> 기존 라인에 추가
          </label>
        </div>
        <div class="adm-log" id="dxfLog"></div>
      </div>

      <div class="adm-sec">
        <h4>📊 엑셀 업로드 (포인트)</h4>
        <div class="file-drop" id="xlsDrop">엑셀 파일을 선택하거나 끌어다 놓으세요</div>
        <input type="file" id="xlsFile" accept=".xlsx,.xls" hidden>
        <div class="btn-row">
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--mut)">
            <input type="checkbox" id="xlsAppend"> 기존 포인트에 추가
          </label>
        </div>
        <div class="adm-log" id="xlsLog"></div>
      </div>

      <div class="adm-sec">
        <h4>👷 담당자 이름</h4>
        <div class="field"><input id="wn1" placeholder="담당자1"></div>
        <div class="field"><input id="wn2" placeholder="담당자2"></div>
        <div class="field"><input id="wn3" placeholder="담당자3"></div>
        <button class="btn btn-pri btn-full" id="wnSave">담당자 이름 저장</button>
      </div>

      <div class="adm-sec">
        <h4>🔗 현장 공유</h4>
        <div class="field"><input id="shareUrl" readonly></div>
        <button class="btn btn-pri btn-full" id="shareCopy">링크 복사</button>
      </div>

    </div>
  </div>
</div>

<!-- 새 사업 모달 -->
<div class="ovl" id="newProjOvl">
  <div class="modal" style="max-width:380px">
    <div class="mhead"><h3>새 사업 등록</h3><button class="mclose" data-close>×</button></div>
    <div class="mbody">
      <div class="field"><label>사업명</label><input id="npName" placeholder="예: 2026년 김포시(상수)"></div>
      <button class="btn btn-pri btn-full" id="npCreate">사업 만들기</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
//  설정
// ═══════════════════════════════════════════════════
const VW_KEY = 'C4DA8041-6991-371D-9C2B-F8C2BCC78E5E';
const FB_CONFIG = {
  apiKey: "AIzaSyDCZils_rrPT3A5c163FM4Ij8ZXQBvPuqE",
  databaseURL: "https://landsurvey2027-default-rtdb.firebaseio.com",
  projectId: "landsurvey2027"
};
const ADMIN_PIN = "0000";
const WORKER_COLORS = {1:'#3b82f6', 2:'#f97316', 3:'#a855f7'};

// URL 파라미터로 사업 ID 받기 (?p=xxx)
const urlParams = new URLSearchParams(location.search);
let PROJ_ID = urlParams.get('p') || localStorage.getItem('lastProj') || '';

// ═══════════════════════════════════════════════════
//  상태
// ═══════════════════════════════════════════════════
let map, baseLayer, satLayer, curBase='base';
let db;
let POINTS = {};      // {name: {la,ln,xn,ye}}
let LINES = [];       // [{tp,layer,pts,color}]
let STATUS = {};      // {name: {done,worker}}
let LINESTATUS = {};  // {line_0:{done,worker}}
let WORKER_NAMES = {1:'담당자1',2:'담당자2',3:'담당자3'};
let PROJECTS = {};    // {pid: {name}}
let DELETED_COUNT = 0;
let ptMarkers = {}, lineLayers = [];
let gpsMarker=null, gpsCircle=null, gpsWatch=null;

// ═══════════════════════════════════════════════════
//  지도 초기화
// ═══════════════════════════════════════════════════
function initMap(){
  map = L.map('map', {
    zoomControl:false, attributionControl:false,
    preferCanvas:true,  // ★ Canvas 렌더링 (성능 대폭 향상)
    renderer: L.canvas({padding:0.5})
  }).setView([37.5,127], 11);

  baseLayer = L.tileLayer(
    `https://api.vworld.kr/req/wmts/1.0.0/${VW_KEY}/Base/{z}/{y}/{x}.png`,
    {maxNativeZoom:19, maxZoom:21, subdomains:''});
  satLayer = L.tileLayer(
    `https://api.vworld.kr/req/wmts/1.0.0/${VW_KEY}/Satellite/{z}/{y}/{x}.jpeg`,
    {maxNativeZoom:19, maxZoom:21});
  const hybrid = L.tileLayer(
    `https://api.vworld.kr/req/wmts/1.0.0/${VW_KEY}/Hybrid/{z}/{y}/{x}.png`,
    {maxNativeZoom:19, maxZoom:21});

  baseLayer.addTo(map);
  window._hybrid = hybrid;

  L.control.zoom({position:'topright'}).addTo(map);
  // 줌 컨트롤을 도구 아래로
  setTimeout(()=>{
    const zc=document.querySelector('.leaflet-control-zoom');
    if(zc){zc.style.marginTop='200px';zc.style.marginRight='10px';}
  },100);

  map.on('dblclick', onMapDblClick);

function statusColor(name){
  const st = STATUS[name];
  // 담당자 배정(=완료) 시 담당자 색, 미배정 시 빨강
  if(st && st.worker) return WORKER_COLORS[st.worker] || '#16a34a';
  return '#dc2626';
}

// ★ 성능 최적화: 화면에 보이는 점만 렌더링 (viewport culling)
let _ptLayer = null;
let _renderTimer = null;

function renderPoints(){
  // 디바운스 - 연속 호출 방지
  clearTimeout(_renderTimer);
  _renderTimer = setTimeout(_doRenderPoints, 80);
}

function _doRenderPoints(){
  if(!_ptLayer){
    _ptLayer = L.layerGroup().addTo(map);
  }
  _ptLayer.clearLayers();
  ptMarkers = {};

  const z = map.getZoom();
  const showLabel = z >= 17;
  const radius = z >= 17 ? 7 : z >= 14 ? 5 : 4;

  // 화면 범위 (여유 20%)
  const bounds = map.getBounds().pad(0.2);

  let rendered = 0;
  Object.keys(POINTS).forEach(name=>{
    const p = POINTS[name];
    if(!p.la || !p.ln) return;
    // ★ 화면 밖이면 건너뜀
    if(!bounds.contains([p.la, p.ln])) return;

    const col = statusColor(name);
    const added = p.added;  // 추가점 여부
    const mk = L.circleMarker([p.la, p.ln], {
      radius: radius,
      fillColor: col,
      color: added ? '#fbbf24' : '#fff',  // 추가점은 노란 테두리
      weight: added ? 3 : 2,
      fillOpacity: 1
    });
    if(showLabel){
      mk.bindTooltip(name, {permanent:true, className:'pt-label', direction:'top', offset:[0,-8]});
    }
    mk.on('click', ()=>{ onPointClick(name); L.DomEvent.stopPropagation(); });
    _ptLayer.addLayer(mk);
    ptMarkers[name] = mk;
    rendered++;
  });
}

function updateLabelVisibility(){
  // 줌 변경 시 다시 렌더 (라벨 표시 갱신)
  renderPoints();
}

let _lineLayer = null;
function renderLines(){
  if(!_lineLayer){ _lineLayer = L.layerGroup().addTo(map); }
  _lineLayer.clearLayers();
  lineLayers = [];

  const bounds = map.getBounds().pad(0.3);

  LINES.forEach((ln, idx)=>{
    if(ln.tp==='text' || !ln.pts || ln.pts.length<2){ lineLayers[idx]=null; return; }
    // 라인 일부라도 화면에 걸치면 그림
    const inView = ln.pts.some(pt=>bounds.contains(pt));
    if(!inView){ lineLayers[idx]=null; return; }

    const st = LINESTATUS['line_'+idx];
    const done = st && st.done;
    const col = done ? '#16a34a' : (ln.color || '#3b82f6');
    const poly = L.polyline(ln.pts, {color: col, weight: done?4:3, opacity:.9});
    poly.on('click', ()=>{ onLineClick(idx); L.DomEvent.stopPropagation(); });
    _lineLayer.addLayer(poly);
    lineLayers[idx] = poly;
  });
}

function renderStats(){
  const chips = document.getElementById('statChips');
  let counts = {un:0, w1:0, w2:0, w3:0, done:0};
  Object.keys(POINTS).forEach(name=>{
    const st = STATUS[name];
    if(st && st.worker==1){ counts.w1++; counts.done++; }
    else if(st && st.worker==2){ counts.w2++; counts.done++; }
    else if(st && st.worker==3){ counts.w3++; counts.done++; }
    else counts.un++;
  });
  const total = Object.keys(POINTS).length;
  const pct = total ? Math.round(counts.done/total*100) : 0;
  chips.innerHTML = `
    <div class="chip"><span class="cdot" style="background:#1e293b"></span>전체 ${total}</div>
    <div class="chip"><span class="cdot" style="background:#dc2626"></span>${counts.un}</div>
    <div class="chip"><span class="cdot" style="background:#3b82f6"></span>${counts.w1}</div>
    <div class="chip"><span class="cdot" style="background:#f97316"></span>${counts.w2}</div>
    <div class="chip"><span class="cdot" style="background:#a855f7"></span>${counts.w3}</div>
    <div class="chip" style="background:#16a34a;color:#fff"><span class="cdot" style="background:#fff"></span>완료 ${counts.done} (${pct}%)</div>
  `;
}

let _hlTimer = null;
function highlightPoint(name){
  // 기존 하이라이트 제거
  clearHighlight();
  const mk = ptMarkers[name];
  if(!mk) return;
  // 마커 강조
  mk.setStyle({radius:14, weight:4, color:'#38bdf8', fillColor:'#0ea5e9'});
  mk.setZIndexOffset?.(1000);
  mk.bringToFront();
  // 번호 라벨 2배 확대
  const tt = mk.getTooltip();
  if(tt && tt._container){
    tt._container.style.display = '';
    tt._container.classList.add('hl');
  }
  // 펄스 원
  const p = POINTS[name];
  const pulse = L.circleMarker([p.la, p.ln], {
    radius:20, color:'#38bdf8', weight:3, fillColor:'#38bdf8', fillOpacity:.15
  }).addTo(map);
  window._hlPulse = pulse;
  window._hlMarker = name;

  _hlTimer = setTimeout(clearHighlight, 5000);
}

function highlightLine(idx){
  clearHighlight();
  const poly = lineLayers[idx];
  if(!poly) return;
  poly._origStyle = {color:poly.options.color, weight:poly.options.weight};
  poly.setStyle({color:'#38bdf8', weight:7, opacity:1});
  poly.bringToFront();
  window._hlLine = idx;
  _hlTimer = setTimeout(clearHighlight, 5000);
}

function clearHighlight(){
  if(_hlTimer){ clearTimeout(_hlTimer); _hlTimer=null; }
  // 포인트 복원
  if(window._hlMarker){
    const mk = ptMarkers[window._hlMarker];
    if(mk){
      mk.setStyle({radius:6, weight:2, color:'#fff', fillColor:statusColor(window._hlMarker)});
      const tt = mk.getTooltip();
      if(tt && tt._container) tt._container.classList.remove('hl');
    }
    window._hlMarker = null;
  }
  if(window._hlPulse){ map.removeLayer(window._hlPulse); window._hlPulse=null; }
  // 라인 복원
  if(window._hlLine != null){
    const poly = lineLayers[window._hlLine];
    if(poly && poly._origStyle) poly.setStyle(poly._origStyle);
    window._hlLine = null;
  }
}

// 라인 길이 계산 (Haversine)
function lineLength(pts){
  let total = 0;
  for(let i=1; i<pts.length; i++){
    total += haversine(pts[i-1][0], pts[i-1][1], pts[i][0], pts[i][1]);
  }
  return total;
}
function haversine(la1,ln1,la2,ln2){
  const R=6371000, rad=Math.PI/180;
  const dLa=(la2-la1)*rad, dLn=(ln2-ln1)*rad;
  const a=Math.sin(dLa/2)**2 + Math.cos(la1*rad)*Math.cos(la2*rad)*Math.sin(dLn/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

function deleteLine(idx){
  if(!confirm(`라인 #${idx+1}을 삭제할까요?`)) return;
  const newLines = LINES.slice();
  newLines.splice(idx, 1);
  // 라인상태 재정렬
  const newStatus = {};
  Object.keys(LINESTATUS).forEach(k=>{
    const n = parseInt(k.replace('line_',''));
    if(n < idx) newStatus[k] = LINESTATUS[k];
    else if(n > idx) newStatus['line_'+(n-1)] = LINESTATUS[k];
  });
  Promise.all([
    db.ref('projects/'+PROJ_ID+'/dxfLines').set(newLines),
    db.ref('projects/'+PROJ_ID+'/lineStatus').set(newStatus)
  ]).then(()=>toast('라인이 삭제되었습니다'));
}

//  Firebase 연동
// ═══════════════════════════════════════════════════
function initFirebase(retry){
  retry = retry || 0;
  // Firebase SDK 로드 대기
  if(typeof firebase === 'undefined'){
    if(retry < 20){
      console.log('Firebase 로딩 대기...', retry);
      setTimeout(()=>initFirebase(retry+1), 300);
      return;
    }
    toast('Firebase 연결 실패 - 인터넷 확인');
    console.error('Firebase SDK를 불러올 수 없습니다');
    return;
  }
  try{
    if(!firebase.apps.length) firebase.initializeApp(FB_CONFIG);
    db = firebase.database();
    console.log('Firebase 연결됨');
    loadProjects();
  }catch(e){
    console.error('Firebase 초기화 오류:', e);
    toast('Firebase 오류: '+e.message);
  }
}

function loadProjects(){
  db.ref('projects').once('value').then(snap=>{
    const all = snap.val() || {};
    PROJECTS = {};
    Object.keys(all).forEach(pid=>{
      PROJECTS[pid] = {name: (all[pid].info && all[pid].info.name) || pid};
    });
    // 사업 선택 채우기
    fillProjectSelect();
    // 현재 사업 없으면 첫번째
    if(!PROJ_ID || !PROJECTS[PROJ_ID]){
      PROJ_ID = Object.keys(PROJECTS)[0] || '';
    }
    if(PROJ_ID) loadProject(PROJ_ID);
  });
}

function loadProject(pid){
  PROJ_ID = pid;
  localStorage.setItem('lastProj', pid);
  document.getElementById('projName').textContent = PROJECTS[pid]?.name || '';
  updateShareUrl();

  const ref = db.ref('projects/'+pid);

  // 포인트
  ref.child('points').on('value', s=>{ POINTS = s.val()||{}; renderAll(); });
  // 라인
  ref.child('dxfLines').on('value', s=>{
    const v = s.val();
    LINES = Array.isArray(v) ? v.filter(Boolean) : (v?Object.values(v):[]);
    renderAll();
  });
  // 포인트 상태
  ref.child('status').on('value', s=>{ STATUS = s.val()||{}; renderAll(); });
  // 라인 상태
  ref.child('lineStatus').on('value', s=>{ LINESTATUS = s.val()||{}; renderLines(); });
  // 삭제 카운터
  ref.child('deletedCount').on('value', s=>{ DELETED_COUNT = s.val()||0; });
  // 담당자 이름
  ref.child('workerNames').on('value', s=>{
    const v = s.val();
    if(v){
      WORKER_NAMES = Array.isArray(v)
        ? {1:v[1]||'담당자1',2:v[2]||'담당자2',3:v[3]||'담당자3'}
        : {1:v['1']||'담당자1',2:v['2']||'담당자2',3:v['3']||'담당자3'};
      document.getElementById('wn1').value = WORKER_NAMES[1];
      document.getElementById('wn2').value = WORKER_NAMES[2];
      document.getElementById('wn3').value = WORKER_NAMES[3];
      updateLegend();
    }
  });

  // 첫 로드 시: 저장된 위치 복원, 없으면 전체보기
  setTimeout(()=>{ if(!restoreMapPos()) fitAll(); }, 800);
}

function fitAll(){
  const bounds = [];
  Object.values(POINTS).forEach(p=>{ if(p.la) bounds.push([p.la,p.ln]); });
  LINES.forEach(l=>{ if(l.pts) l.pts.forEach(pt=>bounds.push(pt)); });
  if(bounds.length) map.fitBounds(bounds, {padding:[50,50], maxZoom:18});
}

function updateShareUrl(){

let _kakaoReady = false, _kakaoGeocoder = null;
function loadKakao(cb){
  if(_kakaoGeocoder){ cb(_kakaoGeocoder); return; }
  if(window.kakao && kakao.maps && kakao.maps.services){
    _kakaoGeocoder = new kakao.maps.services.Geocoder(); cb(_kakaoGeocoder); return;
  }
  const sc = document.createElement('script');
  sc.src = '//dapi.kakao.com/v2/maps/sdk.js?appkey=eb879946d11d6627f85d1ef988dd0de8&libraries=services&autoload=false';
  sc.onload = ()=> kakao.maps.load(()=>{
    _kakaoGeocoder = new kakao.maps.services.Geocoder(); cb(_kakaoGeocoder);
  });
  sc.onerror = ()=> cb(null);
  document.head.appendChild(sc);
}

function reverseGeocode(lat, lng){
  loadKakao(geocoder=>{
    if(!geocoder){ showAddrPopup(lat, lng, '주소 서비스 연결 실패'); return; }
    geocoder.coord2Address(lng, lat, (result, status)=>{
      let addr = '주소를 찾을 수 없습니다';
      if(status === kakao.maps.services.Status.OK && result.length>0){
        const jibun = result[0].address;
        const road = result[0].road_address;
        if(jibun && jibun.address_name) addr = jibun.address_name;
        else if(road && road.address_name) addr = road.address_name;
      }
      showAddrPopup(lat, lng, addr);
    });
  });
}

function showAddrPopup(lat, lng, addr){
  {
    const rvUrl = `https://map.kakao.com/link/roadview/${lat},${lng}`;
    const kakaoUrl = `https://map.kakao.com/link/map/위치,${lat},${lng}`;
    L.popup({maxWidth:280}).setLatLng([lat,lng])
      .setContent(`<div style="min-width:200px">
        <div style="font-weight:700;font-size:14px;color:#0c1e4a;margin-bottom:3px">${addr}</div>
        <div style="color:#64748b;font-size:11px;margin-bottom:8px">${lat.toFixed(6)}, ${lng.toFixed(6)}</div>

          <a href="${kakaoUrl}" target="_blank" style="flex:1;padding:8px;background:#0c1e4a;color:#fff;border-radius:8px;font-size:12px;font-weight:700;text-align:center;text-decoration:none">🗺️ 카카오맵</a>

}

function toggleGPS(){
  const btn = document.getElementById('gpsBtn');
  if(gpsWatch){
    navigator.geolocation.clearWatch(gpsWatch); gpsWatch=null;
    if(gpsMarker) map.removeLayer(gpsMarker);
    if(gpsCircle) map.removeLayer(gpsCircle);
    gpsMarker=gpsCircle=null;
    btn.classList.remove('on');
    return;
  }
  if(!navigator.geolocation){ toast('GPS를 지원하지 않습니다'); return; }
  btn.classList.add('on'); btn.textContent='⌛';
  let first=true;
  gpsWatch = navigator.geolocation.watchPosition(pos=>{
    const {latitude:la, longitude:ln, accuracy:acc} = pos.coords;
    btn.textContent = acc<20?'📍':acc<50?'🔵':acc<100?'🟡':'🔴';
    if(!gpsMarker){
      gpsMarker = L.circleMarker([la,ln],{radius:8,fillColor:'#3b82f6',color:'#fff',weight:3,fillOpacity:1}).addTo(map);
      gpsCircle = L.circle([la,ln],{radius:acc,color:'#3b82f6',fillColor:'#3b82f6',fillOpacity:.1,weight:1}).addTo(map);
    }else{
      gpsMarker.setLatLng([la,ln]);
      gpsCircle.setLatLng([la,ln]).setRadius(acc);
    }
    if(first){ map.setView([la,ln],17); first=false; }
  }, err=>{
    toast('위치 권한을 허용해주세요');
    btn.classList.remove('on'); btn.textContent='📍';
  }, {enableHighAccuracy:true, maximumAge:3000, timeout:15000});
}

// ═══════════════════════════════════════════════════
//  토스트
// ═══════════════════════════════════════════════════
// ═══════════════════════════════════════════════════
//  드래그 박스 선택 (라쏘)
// ═══════════════════════════════════════════════════
let boxSelMode = false;
let boxStart = null, boxRect = null;
let selectedPoints = new Set();

function toggleBoxSelect(){
  boxSelMode = !boxSelMode;
  const btn = document.getElementById('boxSelBtn');
  const hint = document.getElementById('boxHint');
  btn.classList.toggle('on', boxSelMode);
  hint.style.display = boxSelMode ? 'block' : 'none';
  if(boxSelMode){
    map.dragging.disable();
    map.getContainer().style.cursor = 'crosshair';
  }else{
    map.dragging.enable();
    map.getContainer().style.cursor = '';
    clearBoxSelection();
  }
}

function clearBoxSelection(){
  selectedPoints.forEach(name=>{
    const mk = ptMarkers[name];
    if(mk) mk.setStyle({color:'#fff', weight:2, radius:6});
  });
  selectedPoints.clear();
  document.getElementById('selPanel').style.display = 'none';
  if(boxRect){ map.removeLayer(boxRect); boxRect=null; }
}

function initBoxSelect(){
  const mapEl = map.getContainer();

  map.on('mousedown', e=>{
    if(!boxSelMode) return;
    boxStart = e.latlng;
    if(boxRect) map.removeLayer(boxRect);
    boxRect = L.rectangle([boxStart, boxStart], {
      color:'#38bdf8', weight:2, fillColor:'#38bdf8', fillOpacity:.1, dashArray:'5,5'
    }).addTo(map);
  });

  map.on('mousemove', e=>{
    if(!boxSelMode || !boxStart) return;
    boxRect.setBounds([boxStart, e.latlng]);
  });

  map.on('mouseup', e=>{
    if(!boxSelMode || !boxStart) return;
    const bounds = L.latLngBounds([boxStart, e.latlng]);
    boxStart = null;
    // 박스 안의 포인트 선택
    selectedPoints.clear();
    Object.keys(POINTS).forEach(name=>{
      const p = POINTS[name];
      if(p.la && bounds.contains([p.la, p.ln])){
        selectedPoints.add(name);
        const mk = ptMarkers[name];
        if(mk) mk.setStyle({color:'#38bdf8', weight:4, radius:9});
      }
    });
    showSelPanel();
    setTimeout(()=>{ if(boxRect){ map.removeLayer(boxRect); boxRect=null; } }, 1500);
  });

  // 터치 지원 (모바일)
  let touchStart = null;
  mapEl.addEventListener('touchstart', ev=>{
    if(!boxSelMode || ev.touches.length!==1) return;
    const t = ev.touches[0];
    touchStart = map.containerPointToLatLng([t.clientX - mapEl.getBoundingClientRect().left, t.clientY - mapEl.getBoundingClientRect().top]);
    if(boxRect) map.removeLayer(boxRect);
    boxRect = L.rectangle([touchStart, touchStart], {color:'#38bdf8',weight:2,fillColor:'#38bdf8',fillOpacity:.1,dashArray:'5,5'}).addTo(map);
    ev.preventDefault();
  }, {passive:false});
  mapEl.addEventListener('touchmove', ev=>{
    if(!boxSelMode || !touchStart || ev.touches.length!==1) return;
    const t = ev.touches[0];
    const rect = mapEl.getBoundingClientRect();
    const ll = map.containerPointToLatLng([t.clientX - rect.left, t.clientY - rect.top]);
    boxRect.setBounds([touchStart, ll]);
    ev.preventDefault();
  }, {passive:false});
  mapEl.addEventListener('touchend', ev=>{
    if(!boxSelMode || !touchStart) return;
    const bounds = boxRect.getBounds();
    touchStart = null;
    selectedPoints.clear();
    Object.keys(POINTS).forEach(name=>{
      const p = POINTS[name];
      if(p.la && bounds.contains([p.la, p.ln])){
        selectedPoints.add(name);
        const mk = ptMarkers[name];
        if(mk) mk.setStyle({color:'#38bdf8', weight:4, radius:9});
      }
    });
    showSelPanel();
    setTimeout(()=>{ if(boxRect){ map.removeLayer(boxRect); boxRect=null; } }, 1500);
  });
}

function showSelPanel(){
  const panel = document.getElementById('selPanel');
  document.getElementById('selCount').textContent = selectedPoints.size;
  if(selectedPoints.size === 0){ panel.style.display='none'; return; }
  // 담당자 버튼
  const wbtns = document.getElementById('selWorkerBtns');
  let html = '';
  for(let w=1; w<=3; w++){
    html += `<button class="selWbtn" data-w="${w}" style="flex:1;padding:10px 4px;border:2px solid ${WORKER_COLORS[w]};
      background:#fff;color:${WORKER_COLORS[w]};border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">
      ${WORKER_NAMES[w]}</button>`;
  }
  wbtns.innerHTML = html;
  wbtns.querySelectorAll('.selWbtn').forEach(b=>{
    b.onclick = ()=>{
      const w = parseInt(b.dataset.w);
      assignWorkerBatch(w);
    };
  });
  panel.style.display = 'block';
}

function assignWorkerBatch(w){
  const updates = {};
  selectedPoints.forEach(name=>{
    updates['projects/'+PROJ_ID+'/status/'+name] = {worker:w, done:true, doneAt:Date.now()};
  });
  db.ref().update(updates).then(()=>{
    toast(`${selectedPoints.size}개 포인트 → ${WORKER_NAMES[w]} 배정`);
    clearBoxSelection();
    toggleBoxSelect();
  });
}

function cancelWorkerBatch(){
  const updates = {};
  selectedPoints.forEach(name=>{
    updates['projects/'+PROJ_ID+'/status/'+name] = {worker:0, done:false, doneAt:null};
  });
  db.ref().update(updates).then(()=>{
    toast(`${selectedPoints.size}개 포인트 완료취소`);
    clearBoxSelection();
    toggleBoxSelect();
  });
}

function calcStats(){
  const s = {
    total: 0, base: 0, added: 0, deleted: DELETED_COUNT,
    unassigned: 0, done: 0,
    byWorker: {1:0, 2:0, 3:0},
    addedByWorker: {1:0, 2:0, 3:0},
    addedDone: 0, addedUnassigned: 0
  };
  Object.keys(POINTS).forEach(name=>{
    const p = POINTS[name];
    const st = STATUS[name] || {};
    s.total++;
    const isAdded = p.added;
    if(isAdded) s.added++; else s.base++;

    if(st.worker){
      s.done++;
      s.byWorker[st.worker] = (s.byWorker[st.worker]||0) + 1;
      if(isAdded){ s.addedDone++; s.addedByWorker[st.worker]=(s.addedByWorker[st.worker]||0)+1; }
    }else{
      s.unassigned++;
      if(isAdded) s.addedUnassigned++;
    }
  });
  // 전체 물량 = 현재 + 삭제 (원래 받은 양)
  s.originalTotal = s.total + s.deleted;
  return s;
}

function setupDrop(el, handler){
  el.ondragover = e=>{ e.preventDefault(); el.style.borderColor='var(--sky)'; };
  el.ondragleave = ()=>{ el.style.borderColor=''; };
  el.ondrop = e=>{
    e.preventDefault(); el.style.borderColor='';
    if(e.dataTransfer.files[0]) handler(e.dataTransfer.files[0]);
  };
}

function openOvl(id){ document.getElementById(id).classList.add('show'); }

function tryGate(){
  const pin = document.getElementById('gatePin').value;
  if(pin === ADMIN_PIN){
    document.getElementById('gate').classList.remove('show');
    document.getElementById('gateErr').textContent='';
    openOvl('adminOvl');
  }else{
    document.getElementById('gateErr').textContent='PIN이 올바르지 않습니다';
    document.getElementById('gatePin').value='';
  }
}

function doSearch(e){
  const q = e.target.value.trim().toLowerCase();
  const list = document.getElementById('searchList');
  if(!q){ list.innerHTML=''; return; }
  let html='';
  Object.keys(POINTS).filter(n=>n.toLowerCase().includes(q)).slice(0,20).forEach(name=>{
    html += `<div class="litem" onclick="goToPoint('${name}');document.getElementById('searchOvl').classList.remove('show')">
      <span class="ltag" style="background:${statusColor(name)}"></span>
      <div class="lname">${name}</div></div>`;
  });
  // 레이어 검색
  LINES.forEach((l,i)=>{
    if(l.tp==='text' || !l.layer) return;
    if(l.layer.toLowerCase().includes(q)){
      html += `<div class="litem" onclick="goToLine(${i});document.getElementById('searchOvl').classList.remove('show')">
        <span class="ltag" style="background:${l.color||'#3b82f6'}"></span>
        <div><div class="lname">${l.layer} #${i+1}</div><div class="lsub">라인</div></div></div>`;
    }
  });
  list.innerHTML = html || '<div style="padding:20px;text-align:center;color:#94a3b8">결과 없음</div>';
}

// ═══════════════════════════════════════════════════
//  DXF 파싱 (브라우저)
// ═══════════════════════════════════════════════════
const ACI = {1:'#FF0000',2:'#FFFF00',3:'#00FF00',4:'#00FFFF',5:'#0000FF',
  6:'#FF00FF',7:'#000000',8:'#808080',9:'#C0C0C0',
  10:'#FF0000',30:'#FF7F00',40:'#FFFF00',50:'#7FFF00',60:'#00FF00',
  90:'#007FFF',100:'#0000FF',110:'#7F00FF',250:'#808080',252:'#C0C0C0'};
function aci2hex(n){ n=Math.abs(parseInt(n)||7); return ACI[n]||'#3b82f6'; }

// TM(중부원점) → WGS84
function tmToWgs(N, E){
  const a=6378137.0, f=1/298.257222101, e2=2*f-f*f;
  const lam0=127*Math.PI/180, phi0=38*Math.PI/180, FN=600000, FE=200000;
  function ma(p){
    const e4=e2*e2, e6=e4*e2;
    return a*((1-e2/4-3*e4/64-5*e6/256)*p-(3*e2/8+3*e4/32+45*e6/1024)*Math.sin(2*p)
      +(15*e4/256+45*e6/1024)*Math.sin(4*p)-(35*e6/3072)*Math.sin(6*p));
  }
  const e4=e2*e2, e6=e4*e2;
  const M=ma(phi0)+(N-FN);
  const mu=M/(a*(1-e2/4-3*e4/64-5*e6/256));
  const e1=(1-Math.sqrt(1-e2))/(1+Math.sqrt(1-e2));
  const p1=mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1**2/16-55*e1**4/32)*Math.sin(4*mu)
    +151*e1**3/96*Math.sin(6*mu)+1097*e1**4/512*Math.sin(8*mu);
  const s1=Math.sin(p1), c1=Math.cos(p1), t1=Math.tan(p1);
  const N1=a/Math.sqrt(1-e2*s1*s1), T1=t1*t1, C1=e2/(1-e2)*c1*c1;
  const R1=a*(1-e2)/Math.pow(1-e2*s1*s1,1.5), D=(E-FE)/N1;
  const lat=p1-(N1*t1/R1)*(D*D/2-D**4/24*(5+3*T1+10*C1-4*C1*C1-9*e2/(1-e2))
    +D**6/720*(61+90*T1+298*C1+45*T1*T1-252*e2/(1-e2)-3*C1*C1));
  const lon=lam0+(D-D**3/6*(1+2*T1+C1)+D**5/120*(5-2*C1+28*T1-3*C1*C1+8*e2/(1-e2)+24*T1*T1))/c1;
  return [lat*180/Math.PI, lon*180/Math.PI];
}

function parseDXF(text){
  const raw = text.split(/\r?\n/);
  const layerColors = {};
  const entities = [];
  let i = 0;

  while(i < raw.length){
    const gc = parseInt(raw[i]);
    if(isNaN(gc)){ i++; continue; }
    const val = (raw[i+1]||'').trim();
    i += 2;
    if(gc === 0){
      const etype = val.toUpperCase();
      const pairs = [];
      while(i < raw.length){
        const gc2 = parseInt(raw[i]);
        if(isNaN(gc2)){ i++; continue; }
        const v2 = (raw[i+1]||'').trim();
        i += 2;
        if(gc2 === 0){ i -= 2; break; }
        pairs.push([gc2, v2]);
      }
      const pdict = {};
      pairs.forEach(([g,v])=>{ if(!(g in pdict)) pdict[g]=v; });

      if(etype === 'LAYER'){
        const lname = pdict[2]||'';
        const ltc = pdict[420];
        if(lname){
          if(ltc){ const tc=parseInt(ltc); layerColors[lname]=rgbHex(tc); }
          else layerColors[lname]=aci2hex(pdict[62]||7);
        }
      } else if(['LWPOLYLINE','LINE','POLYLINE'].includes(etype)){
        let color=null;
        if(pairs.some(p=>p[0]===420)) color=rgbHex(parseInt(pdict[420]));
        else if(pairs.some(p=>p[0]===62)){ const ci=parseInt(pdict[62]); if(ci!==0&&ci!==256) color=aci2hex(ci); }
        entities.push({type:etype, layer:pdict[8]||'0', pairs, color});
      }
    }
  }

  const result = [];
  entities.forEach(ent=>{
    const pdict = {}; ent.pairs.forEach(([g,v])=>{ if(!(g in pdict)) pdict[g]=v; });
    const color = ent.color || layerColors[ent.layer];
    let rawPts = [];
    if(ent.type==='LWPOLYLINE' || ent.type==='POLYLINE'){
      const xs = ent.pairs.filter(p=>p[0]===10).map(p=>parseFloat(p[1]));
      const ys = ent.pairs.filter(p=>p[0]===20).map(p=>parseFloat(p[1]));
      rawPts = xs.map((x,k)=>[x, ys[k]]);
    } else if(ent.type==='LINE'){
      rawPts = [[parseFloat(pdict[10]||0), parseFloat(pdict[20]||0)],
                [parseFloat(pdict[11]||0), parseFloat(pdict[21]||0)]];
    }
    if(rawPts.length < 2) return;
    // 좌표축 판별
    const eCol = (Math.abs(rawPts[0][0]) > Math.abs(rawPts[0][1])) ? 'x' : 'y';
    const wgs = [];
    rawPts.forEach(([px,py])=>{
      const N = (eCol==='x') ? py : px;
      const E = (eCol==='x') ? px : py;
      const [la, ln] = tmToWgs(N, E);
      if(la>30 && la<40 && ln>124 && ln<132) wgs.push([+la.toFixed(6), +ln.toFixed(6)]);
    });
    if(wgs.length >= 2){
      const row = {tp:'line', layer:ent.layer, pts:wgs};
      if(color) row.color = color;
      result.push(row);
    }
  });
  return result;
}
function rgbHex(tc){ return '#'+[(tc>>16)&255,(tc>>8)&255,tc&255].map(x=>x.toString(16).padStart(2,'0')).join('').toUpperCase(); }

function handleDXF(file){
  const log = document.getElementById('dxfLog');
  log.textContent = '⏳ DXF 파싱 중...';
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const lines = parseDXF(e.target.result);
      if(!lines.length){ log.textContent='❌ 추출된 라인이 없습니다'; return; }
      const append = document.getElementById('dxfAppend').checked;
      let merged = lines;
      if(append){
        const existing = LINES.slice();
        merged = existing.concat(lines);
      }
      db.ref('projects/'+PROJ_ID+'/dxfLines').set(merged).then(()=>{
        log.textContent = `✅ ${lines.length}개 라인 ${append?'추가':'업로드'} 완료 (총 ${merged.length}개)`;
        toast('DXF 업로드 완료');
      });
    }catch(ex){ log.textContent='❌ 오류: '+ex.message; }
  };
  reader.readAsText(file, 'utf-8');
}

// ═══════════════════════════════════════════════════
//  엑셀 파싱 (ExcelJS)
// ═══════════════════════════════════════════════════
// 엑셀 행들에서 좌표 추출 (TM 우선, Python best_parse와 동일 로직)
function bestParseRows(rows){
  if(!rows.length) return [];
  const hdr = rows[0].map(h=>String(h||'').toLowerCase());

  // 이름 컬럼 탐지
  const nameKeys = ['포인트','번호','name','명칭','측점','지점','점번','점명','관리번호','지점명','측점명','no','id'];
  const ni = hdr.findIndex(h=>nameKeys.some(k=>h.includes(k)));

  // TM 변환 시도 (yi=N좌표열, xi=E좌표열)
  function tryTM(yi, xi){
    const pts = [];
    for(let i=1; i<rows.length; i++){
      const row = rows[i];
      try{
        const nv = parseFloat(String(row[yi]).replace(/,/g,''));
        const ev = parseFloat(String(row[xi]).replace(/,/g,''));
        if(nv>200000 && nv<700000 && ev>100000 && ev<400000){
          const [la,ln] = tmToWgs(nv, ev);
          if(la>30 && la<40 && ln>124 && ln<132){
            const nm = (ni>=0 && row[ni]) ? String(row[ni]).trim() : ('K'+String(i).padStart(4,'0'));
            pts.push([nm, la, ln, Math.round(nv*1000)/1000, Math.round(ev*1000)/1000]);
          }
        }
      }catch(e){}
    }
    return pts;
  }

  // ① TM 우선: B열=X(N), C열=Y(E)
  let tmPts = [];
  if(rows[0].length > 2) tmPts = tryTM(1, 2);

  // ② 안되면 전체 조합 탐색
  if(tmPts.length <= 5){
    const maxC = Math.min(hdr.length, 15);
    for(let yi=0; yi<maxC; yi++){
      for(let xi=0; xi<maxC; xi++){
        if(xi===yi) continue;
        const p = tryTM(yi, xi);
        if(p.length > tmPts.length) tmPts = p;
      }
      if(tmPts.length > 10) break;
    }
  }
  if(tmPts.length > 5) return tmPts;

  // ③ 다음지도 URL 추출
  const urlPts = [];
  for(const row of rows){
    for(const cell of row){
      const m = String(cell).match(/link\/map\/([^,\s]+),([\d.]+),([\d.]+)/);
      if(m){ urlPts.push([m[1], parseFloat(m[2]), parseFloat(m[3]), null, null]); break; }
    }
  }
  if(urlPts.length) return urlPts;

  // ④ 위도/경도 직접 컬럼
  const li = hdr.findIndex(h=>h.includes('위도')||h.includes('lat'));
  const gi = hdr.findIndex(h=>h.includes('경도')||h.includes('lng')||h.includes('lon'));
  if(li>=0 && gi>=0){
    const llPts = [];
    for(let i=1; i<rows.length; i++){
      const row = rows[i];
      try{
        const la=parseFloat(row[li]), ln=parseFloat(row[gi]);
        if(la>30 && la<40 && ln>124 && ln<132){
          const nm = (ni>=0 && row[ni]) ? String(row[ni]).trim() : ('P'+i);
          llPts.push([nm, la, ln, null, null]);
        }
      }catch(e){}
    }
    return llPts;
  }
  return [];
}

async function handleXLS(file){
  const log = document.getElementById('xlsLog');
  log.textContent = '⏳ 엑셀 읽는 중...';
  try{
    const buf = await file.arrayBuffer();
    const wb = new ExcelJS.Workbook();
    await wb.xlsx.load(buf);

    // 모든 시트에서 best 파싱
    let bestPts = [];
    wb.worksheets.forEach(ws=>{
      const rows = [];
      ws.eachRow({includeEmpty:true}, row=>{
        const vals = [];
        row.eachCell({includeEmpty:true}, cell=>{
          vals.push(cell.value==null ? '' : cell.value);
        });
        rows.push(vals);
      });
      const pts = bestParseRows(rows);
      if(pts.length > bestPts.length) bestPts = pts;
    });

    if(!bestPts.length){
      log.textContent='❌ 좌표를 찾지 못했습니다 (X,Y 또는 위경도 확인)';
      return;
    }

    // points 객체로 변환
    const points = {};
    bestPts.forEach(([nm, la, ln, xn, ye])=>{
      points[nm] = {la, ln};
      if(xn!=null) points[nm].xn = xn;
      if(ye!=null) points[nm].ye = ye;
    });

    const append = document.getElementById('xlsAppend').checked;
    let final = points, addInfo = '';
    if(append){
      let dup = 0, add = 0;
      const now = Date.now();
      final = Object.assign({}, POINTS);
      Object.keys(points).forEach(nm=>{
        if(final[nm]){ dup++; final[nm] = points[nm]; }
        else {
          add++;
          // ★ 추가점 표시
          points[nm].added = true;
          points[nm].addedAt = now;
          final[nm] = points[nm];
        }
      });
      addInfo = ` (추가점 ${add}, 갱신 ${dup})`;
    }
    await db.ref('projects/'+PROJ_ID+'/points').set(final);
    log.textContent = `✅ ${bestPts.length}개 좌표 ${append?'추가':'업로드'} 완료${addInfo}`;
    toast('엑셀 업로드 완료');
  }catch(ex){ log.textContent = '❌ 오류: '+ex.message; }
}
